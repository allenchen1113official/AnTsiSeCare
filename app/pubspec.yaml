name: antsicare
description: AnTsiSeCare（安心照護）- 全台長照服務整合 APP
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Storage (Offline / Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # i18n / Multi-language
  easy_localization: ^3.0.7

  # Navigation
  go_router: ^14.3.0

  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # Maps — OpenStreetMap (flutter_map) + Google Maps fallback
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_map_cancellable_tile_provider: ^2.0.0
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Speech / Voice
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # Timezone
  timezone: ^0.9.4

  # Image / Camera
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # UI Components
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  badges: ^3.1.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.2
  shared_preferences: ^2.3.3

  # HTTP (for Claude API translation)
  http: ^1.2.2

  # Apple Watch / Google Health Connect — 心率監測
  health: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/icons/

  fonts:
    - family: NotoSansTC
      fonts:
        - asset: assets/fonts/NotoSansTC-Regular.ttf
        - asset: assets/fonts/NotoSansTC-Bold.ttf
          weight: 700
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
